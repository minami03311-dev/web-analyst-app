<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#cdeee3">
<title>ウェブ解析士 学習カード</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%8A%3C/text%3E%3C/svg%3E">
<style>
  :root{
    --bg:#eefaf5; --card:#ffffff; --teal:#3fb59a; --teal-soft:#cdeee3;
    --blue:#9ed2e8; --yellow:#ffe9a8; --text:#3f5750; --sub:#8aa39b;
    --shadow:0 6px 18px rgba(63,181,154,.22);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:-apple-system,"Hiragino Maru Gothic ProN","Hiragino Kaku Gothic ProN",sans-serif;
    background:var(--bg);color:var(--text);line-height:1.7;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);}
  header{text-align:center;padding:20px 16px 12px;background:linear-gradient(160deg,var(--teal-soft),#fff);border-bottom:2px dashed var(--teal)}
  header h1{margin:0;font-size:1.3rem}
  header p{margin:5px 0 0;font-size:.78rem;color:var(--sub)}
  .wrap{max-width:560px;margin:0 auto;padding:14px}

  /* tabs */
  .tabs{display:flex;gap:8px;margin-bottom:14px}
  .tabs button{flex:1;padding:11px;border:none;border-radius:14px;background:#fff;color:var(--sub);font-size:.95rem;font-weight:700;box-shadow:var(--shadow);cursor:pointer}
  .tabs button.active{background:linear-gradient(90deg,var(--teal),var(--blue));color:#fff}

  /* category chips */
  .chips{display:flex;gap:7px;overflow-x:auto;padding-bottom:8px;margin-bottom:8px;-webkit-overflow-scrolling:touch}
  .chips button{flex:0 0 auto;padding:7px 14px;border:none;border-radius:20px;background:#fff;color:var(--sub);font-size:.82rem;font-weight:700;box-shadow:var(--shadow);cursor:pointer;white-space:nowrap}
  .chips button.active{background:var(--teal);color:#fff}

  /* flashcard */
  .counter{text-align:center;font-size:.8rem;color:var(--sub);margin-bottom:8px}
  .flash{background:var(--card);border-radius:24px;box-shadow:var(--shadow);min-height:260px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
    padding:26px 22px;cursor:pointer;position:relative;border:3px solid transparent;transition:border-color .2s}
  .flash.known{border-color:var(--teal)}
  .flash .cat{position:absolute;top:14px;left:16px;font-size:.7rem;color:#fff;background:var(--blue);padding:3px 10px;border-radius:14px}
  .flash .known-mark{position:absolute;top:12px;right:14px;font-size:1.2rem;color:var(--teal)}
  .flash .front-term{font-size:1.7rem;font-weight:800}
  .flash .front-hint{margin-top:14px;font-size:.78rem;color:var(--sub)}
  .flash .reading{font-size:.85rem;color:var(--teal);font-weight:700;margin-bottom:6px}
  .flash .def{font-size:.98rem}
  .flash .eng{font-size:.74rem;color:var(--sub);margin-top:10px}

  .nav{display:flex;gap:10px;margin-top:14px}
  .nav button{flex:1;padding:13px;border:none;border-radius:14px;background:#fff;color:var(--text);font-size:.95rem;font-weight:700;box-shadow:var(--shadow);cursor:pointer}
  .nav button:active{transform:scale(.97)}
  .knowbtn{margin-top:10px;width:100%;padding:13px;border:none;border-radius:14px;background:var(--teal-soft);color:var(--teal);font-weight:800;font-size:.95rem;cursor:pointer}
  .knowbtn.on{background:var(--teal);color:#fff}

  /* formula list */
  .frm{background:var(--card);border-radius:18px;padding:15px 16px;margin-bottom:12px;box-shadow:var(--shadow)}
  .frm .fname{font-weight:800;font-size:1rem}
  .frm .fdesc{font-size:.78rem;color:var(--sub);margin:2px 0 8px}
  .frm .feq{background:var(--bg);border-radius:12px;padding:10px 12px;font-size:.92rem;font-weight:700;border-left:5px solid var(--teal)}
  .frm .fex{font-size:.8rem;margin-top:8px;color:var(--text)}
  .frm .fex b{color:var(--teal)}
  .view{display:none}.view.show{display:block}
  footer{text-align:center;font-size:.72rem;color:var(--sub);padding:18px}
</style>
</head>
<body>
<header>
  <h1>📊 ウェブ解析士 学習カード</h1>
  <p>初級｜用語の暗記カード＆重要公式集</p>
</header>
<div class="wrap">
  <div class="tabs">
    <button id="tabCards" class="active" onclick="switchTab('cards')">📇 用語カード</button>
    <button id="tabForms" onclick="switchTab('forms')">🧮 公式集</button>
  </div>

  <!-- 用語カード -->
  <div id="viewCards" class="view show">
    <div class="chips" id="chips"></div>
    <div class="counter" id="counter"></div>
    <div class="flash" id="flash" onclick="flip()"></div>
    <button class="knowbtn" id="knowbtn" onclick="toggleKnown(event)">覚えた！にする</button>
    <div class="nav">
      <button onclick="prev()">← 前</button>
      <button onclick="next()">次 →</button>
    </div>
    <footer>カードをタップすると意味が出るよ 🌿</footer>
  </div>

  <!-- 公式集 -->
  <div id="viewForms" class="view">
    <div id="forms"></div>
    <footer>計算問題はここを暗記！ ✍️</footer>
  </div>
</div>

<script>
const TERMS = [
  // ---- 指標・数値 ----
  {t:"セッション", r:"せっしょん", e:"Session", c:"指標", d:"ユーザーがサイトを訪問してから離れるまでの一連の行動のまとまり。「訪問数」とほぼ同じ意味。"},
  {t:"PV（ページビュー）", r:"ぺーじびゅー", e:"Page View", c:"指標", d:"ページが表示された回数。同じ人が同じページを3回見れば3PV。"},
  {t:"ユーザー数", r:"ゆーざーすう", e:"Users", c:"指標", d:"サイトを訪れた人の数（重複を除いた人数）。1人が何回来てもユーザー数は1。"},
  {t:"CV（コンバージョン）", r:"こんばーじょん", e:"Conversion", c:"指標", d:"サイトの最終的な成果。購入・申込・問い合わせなど「達成してほしい行動」。"},
  {t:"CVR（コンバージョン率）", r:"こんばーじょんりつ", e:"Conversion Rate", c:"指標", d:"訪問のうち何%が成果に至ったか。CV数 ÷ セッション数 ×100。"},
  {t:"CTR（クリック率）", r:"くりっくりつ", e:"Click Through Rate", c:"指標", d:"広告やリンクが表示された回数のうち、クリックされた割合。"},
  {t:"CPC（クリック単価）", r:"くりっくたんか", e:"Cost Per Click", c:"指標", d:"1クリックを得るのにかかった広告費。広告費 ÷ クリック数。"},
  {t:"CPA（顧客獲得単価）", r:"こきゃくかくとくたんか", e:"Cost Per Acquisition", c:"指標", d:"1件の成果（CV）を得るのにかかった費用。広告費 ÷ CV数。低いほど効率が良い。"},
  {t:"CPM（インプレッション単価）", r:"いんぷれっしょんたんか", e:"Cost Per Mille", c:"指標", d:"広告を1,000回表示するのにかかる費用。広告費 ÷ 表示回数 ×1000。"},
  {t:"ROAS", r:"ろあす", e:"Return On Ad Spend", c:"指標", d:"広告費に対して何倍の売上が出たか。売上 ÷ 広告費 ×100（%）。広告の費用対効果。"},
  {t:"ROI", r:"ろーあい／あーるおーあい", e:"Return On Investment", c:"指標", d:"投資に対する利益の割合。利益 ÷ 投資額 ×100（%）。ROASは売上ベース、ROIは利益ベース。"},
  {t:"LTV（顧客生涯価値）", r:"らいふたいむばりゅー", e:"Life Time Value", c:"指標", d:"1人の顧客が取引期間を通じてもたらす利益の総額。リピートが多いほど高くなる。"},
  {t:"客単価", r:"きゃくたんか", e:"Average Order Value", c:"指標", d:"顧客1人あたりの平均購入金額。売上 ÷ 購入者数。"},
  {t:"インプレッション", r:"いんぷれっしょん", e:"Impression", c:"指標", d:"広告やコンテンツが表示された回数。"},
  {t:"直帰率", r:"ちょっきりつ", e:"Bounce Rate", c:"指標", d:"最初の1ページだけ見て離脱したセッションの割合。GA4では「エンゲージのなかったセッションの割合」と定義。"},
  {t:"離脱率", r:"りだつりつ", e:"Exit Rate", c:"指標", d:"そのページが、訪問の最後のページになった割合。離脱数 ÷ そのページのPV。"},

  // ---- GA4 ----
  {t:"GA4", r:"じーえーふぉー", e:"Google Analytics 4", c:"GA4", d:"Googleの最新アクセス解析ツール。すべての行動を「イベント」として計測するのが特徴。"},
  {t:"イベント", r:"いべんと", e:"Event", c:"GA4", d:"GA4での計測の基本単位。ページ表示・クリック・スクロール・購入などすべてがイベント。"},
  {t:"エンゲージメント率", r:"えんげーじめんとりつ", e:"Engagement Rate", c:"GA4", d:"全セッションのうち、関心を持って利用された（10秒以上・CV・2PV以上などの）セッションの割合。"},
  {t:"ディメンションと指標", r:"でぃめんしょんとしひょう", e:"Dimension / Metric", c:"GA4", d:"ディメンション＝データの『軸・属性』（例：参照元、ページ）。指標＝『数値』（例：セッション数、CV数）。"},
  {t:"参照元／メディア", r:"さんしょうもと／めでぃあ", e:"Source / Medium", c:"GA4", d:"どこから来たか（参照元：google等）と、どんな種類か（メディア：organic, cpc, referral等）の組み合わせ。"},

  // ---- 集客 ----
  {t:"オーガニック検索", r:"おーがにっくけんさく", e:"Organic Search", c:"集客", d:"検索結果の自然枠（広告でない部分）からの流入。SEOで増やす。"},
  {t:"リスティング広告", r:"りすてぃんぐこうこく", e:"Listing Ads", c:"集客", d:"検索結果に出る、検索キーワード連動型の広告。クリック課金（CPC）が基本。"},
  {t:"SEO", r:"えすいーおー", e:"Search Engine Optimization", c:"集客", d:"検索エンジン最適化。自然検索で上位に表示されるようサイトを改善すること。"},
  {t:"ランディングページ", r:"らんでぃんぐぺーじ", e:"Landing Page (LP)", c:"集客", d:"ユーザーが最初に着地（landing）するページ。広告の遷移先など、CV獲得用の1枚ページも指す。"},
  {t:"ファネル", r:"ふぁねる", e:"Funnel", c:"集客", d:"認知→興味→比較→購入のように、段階を経るごとに人数が絞られていく『漏斗（じょうご）』の考え方。"},

  // ---- 分析・戦略 ----
  {t:"KGI", r:"けーじーあい", e:"Key Goal Indicator", c:"分析", d:"重要目標達成指標。最終ゴールを数値化したもの（例：年間売上1億円）。"},
  {t:"KPI", r:"けーぴーあい", e:"Key Performance Indicator", c:"分析", d:"重要業績評価指標。KGI達成までの中間目標を数値化したもの（例：月間CV数500）。"},
  {t:"KSF（重要成功要因）", r:"けーえすえふ", e:"Key Success Factor", c:"分析", d:"目標を達成するために特に重要となる要因。「何をやれば勝てるか」のカギ。"},
  {t:"3C分析", r:"さんしーぶんせき", e:"3C Analysis", c:"分析", d:"Customer（市場・顧客）・Competitor（競合）・Company（自社）の3視点で市場環境を分析する手法。"},
  {t:"SWOT分析", r:"すうぉっとぶんせき", e:"SWOT Analysis", c:"分析", d:"Strength（強み）・Weakness（弱み）・Opportunity（機会）・Threat（脅威）で自社の状況を整理。"},
  {t:"4P", r:"よんぴー", e:"4P", c:"分析", d:"売り手目線のマーケ要素：Product（製品）・Price（価格）・Place（流通）・Promotion（販促）。"},
  {t:"4C", r:"よんしー", e:"4C", c:"分析", d:"買い手目線のマーケ要素：Customer Value（顧客価値）・Cost・Convenience（利便性）・Communication。"},
  {t:"PEST分析", r:"ぺすとぶんせき", e:"PEST Analysis", c:"分析", d:"Politics（政治）・Economy（経済）・Society（社会）・Technology（技術）で外部環境（マクロ）を分析。"},
  {t:"ペルソナ", r:"ぺるそな", e:"Persona", c:"分析", d:"年齢・職業・悩みなどを具体的に設定した、典型的な顧客像（架空の1人）。"},
  {t:"カスタマージャーニー", r:"かすたまーじゃーにー", e:"Customer Journey", c:"分析", d:"顧客が認知から購入・利用までにたどる体験の流れ。各段階の心理や接点を可視化する。"},
  {t:"売上の方程式", r:"うりあげのほうていしき", e:"Sales Equation", c:"分析", d:"売上 ＝ 訪問数 × CVR × 客単価。どの要素を伸ばせば売上が上がるかを分解して考える基本式。"}
];

const FORMULAS = [
  {n:"CVR（コンバージョン率）", d:"訪問のうち成果に至った割合", eq:"CVR ＝ CV数 ÷ セッション数 × 100（%）", ex:"例：1,000セッションで20CV → 20÷1000×100＝<b>2%</b>"},
  {n:"CTR（クリック率）", d:"表示に対してクリックされた割合", eq:"CTR ＝ クリック数 ÷ 表示回数 × 100（%）", ex:"例：10,000表示で300クリック → 300÷10000×100＝<b>3%</b>"},
  {n:"CPC（クリック単価）", d:"1クリックあたりの費用", eq:"CPC ＝ 広告費 ÷ クリック数", ex:"例：広告費30,000円で600クリック → 30000÷600＝<b>50円</b>"},
  {n:"CPA（顧客獲得単価）", d:"1件のCVを得る費用（低いほど良い）", eq:"CPA ＝ 広告費 ÷ CV数", ex:"例：広告費50,000円で25CV → 50000÷25＝<b>2,000円</b>"},
  {n:"CPM（インプレッション単価）", d:"1,000回表示あたりの費用", eq:"CPM ＝ 広告費 ÷ 表示回数 × 1,000", ex:"例：広告費20,000円で500,000表示 → 20000÷500000×1000＝<b>40円</b>"},
  {n:"ROAS（広告費用対効果）", d:"広告費に対する売上の割合", eq:"ROAS ＝ 売上 ÷ 広告費 × 100（%）", ex:"例：広告費100,000円で売上400,000円 → 400000÷100000×100＝<b>400%</b>"},
  {n:"ROI（投資対効果）", d:"投資に対する利益の割合", eq:"ROI ＝ 利益 ÷ 投資額 × 100（%）　※利益＝売上−コスト", ex:"例：投資100,000円・利益50,000円 → 50000÷100000×100＝<b>50%</b>"},
  {n:"売上の方程式", d:"売上を3要素に分解する基本式", eq:"売上 ＝ 訪問数 × CVR × 客単価", ex:"例：10,000訪問 × 2% × 5,000円 → 10000×0.02×5000＝<b>100万円</b>"},
  {n:"客単価", d:"顧客1人あたりの平均購入額", eq:"客単価 ＝ 売上 ÷ 購入者数", ex:"例：売上600,000円・購入者200人 → 600000÷200＝<b>3,000円</b>"},
  {n:"LTV（顧客生涯価値・簡易版）", d:"1顧客が生涯にもたらす利益", eq:"LTV ＝ 客単価 × 粗利率 × 購入回数（継続期間）", ex:"例：客単価5,000円 × 粗利40% × 6回 → 5000×0.4×6＝<b>12,000円</b>"},
  {n:"直帰率", d:"1ページで離脱したセッションの割合", eq:"直帰率 ＝ 直帰したセッション数 ÷ セッション数 × 100（%）", ex:"例：1,000セッションで600直帰 → 600÷1000×100＝<b>60%</b>"}
];

const CATS = ["全部","指標","GA4","集客","分析"];
const KEY = "wa_known";
let curCat = "全部", idx = 0, flipped = false;

function getKnown(){ try{return JSON.parse(localStorage.getItem(KEY))||[]}catch(e){return[]} }
function setKnown(a){ localStorage.setItem(KEY, JSON.stringify(a)); }
function deck(){ return curCat==="全部" ? TERMS : TERMS.filter(t=>t.c===curCat); }

function renderChips(){
  const c = document.getElementById('chips'); c.innerHTML='';
  CATS.forEach(cat=>{
    const b=document.createElement('button');
    b.textContent = cat==="全部"?"全部":cat;
    if(cat===curCat) b.className='active';
    b.onclick=()=>{curCat=cat;idx=0;flipped=false;renderChips();renderCard();};
    c.appendChild(b);
  });
}

function renderCard(){
  const d = deck();
  if(d.length===0) return;
  if(idx>=d.length) idx=0;
  const t = d[idx];
  const known = getKnown().includes(t.t);
  document.getElementById('counter').textContent = `${idx+1} / ${d.length}　（覚えた：${getKnown().length}/${TERMS.length}）`;
  const f = document.getElementById('flash');
  f.className = 'flash' + (known?' known':'');
  if(!flipped){
    f.innerHTML = `<div class="cat">${t.c}</div>${known?'<div class="known-mark">✓</div>':''}
      <div class="front-term">${t.t}</div><div class="front-hint">タップで意味を見る 👆</div>`;
  }else{
    f.innerHTML = `<div class="cat">${t.c}</div>${known?'<div class="known-mark">✓</div>':''}
      <div class="reading">${t.r}</div><div class="def">${t.d}</div><div class="eng">${t.e}</div>`;
  }
  const kb = document.getElementById('knowbtn');
  kb.className = 'knowbtn' + (known?' on':'');
  kb.textContent = known?'✓ 覚えた！（解除）':'覚えた！にする';
}

function flip(){ flipped=!flipped; renderCard(); }
function next(){ idx=(idx+1)%deck().length; flipped=false; renderCard(); }
function prev(){ const n=deck().length; idx=(idx-1+n)%n; flipped=false; renderCard(); }
function toggleKnown(ev){
  ev.stopPropagation();
  const t = deck()[idx];
  let k = getKnown();
  if(k.includes(t.t)) k=k.filter(x=>x!==t.t); else k.push(t.t);
  setKnown(k); renderCard();
}

function renderForms(){
  const c=document.getElementById('forms'); c.innerHTML='';
  FORMULAS.forEach(f=>{
    const el=document.createElement('div'); el.className='frm';
    el.innerHTML=`<div class="fname">${f.n}</div><div class="fdesc">${f.d}</div>
      <div class="feq">${f.eq}</div><div class="fex">${f.ex}</div>`;
    c.appendChild(el);
  });
}

function switchTab(which){
  document.getElementById('tabCards').classList.toggle('active', which==='cards');
  document.getElementById('tabForms').classList.toggle('active', which==='forms');
  document.getElementById('viewCards').classList.toggle('show', which==='cards');
  document.getElementById('viewForms').classList.toggle('show', which==='forms');
  window.scrollTo(0,0);
}

renderChips(); renderCard(); renderForms();
</script>
</body>
</html>
