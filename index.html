<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#cdeee3">
<title>ウェブ解析士 学習カード</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%8A%3C/text%3E%3C/svg%3E">
<style>
  :root{
    --bg:#eefaf5; --card:#ffffff; --teal:#3fb59a; --teal-soft:#cdeee3;
    --blue:#9ed2e8; --yellow:#ffe9a8; --red:#ff9a8c; --green:#7fce9e;
    --text:#3f5750; --sub:#8aa39b; --shadow:0 6px 18px rgba(63,181,154,.22);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:-apple-system,"Hiragino Maru Gothic ProN","Hiragino Kaku Gothic ProN",sans-serif;
    background:var(--bg);color:var(--text);line-height:1.7;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);}
  header{text-align:center;padding:18px 16px 10px;background:linear-gradient(160deg,var(--teal-soft),#fff);border-bottom:2px dashed var(--teal)}
  header h1{margin:0;font-size:1.22rem}
  header p{margin:5px 0 0;font-size:.74rem;color:var(--sub)}
  .wrap{max-width:560px;margin:0 auto;padding:12px}

  .tabs{display:flex;gap:6px;margin-bottom:12px}
  .tabs button{flex:1;padding:10px 4px;border:none;border-radius:13px;background:#fff;color:var(--sub);font-size:.82rem;font-weight:700;box-shadow:var(--shadow);cursor:pointer}
  .tabs button.active{background:linear-gradient(90deg,var(--teal),var(--blue));color:#fff}

  .chips{display:flex;gap:7px;overflow-x:auto;padding-bottom:8px;margin-bottom:8px;-webkit-overflow-scrolling:touch}
  .chips button{flex:0 0 auto;padding:6px 13px;border:none;border-radius:20px;background:#fff;color:var(--sub);font-size:.8rem;font-weight:700;box-shadow:var(--shadow);cursor:pointer;white-space:nowrap}
  .chips button.active{background:var(--teal);color:#fff}

  /* flashcard */
  .counter{text-align:center;font-size:.78rem;color:var(--sub);margin-bottom:8px}
  .flash{background:var(--card);border-radius:24px;box-shadow:var(--shadow);min-height:250px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
    padding:24px 20px;cursor:pointer;position:relative;border:3px solid transparent;transition:border-color .2s}
  .flash.known{border-color:var(--teal)}
  .flash .cat{position:absolute;top:13px;left:15px;font-size:.68rem;color:#fff;background:var(--blue);padding:3px 10px;border-radius:14px}
  .flash .known-mark{position:absolute;top:11px;right:13px;font-size:1.2rem;color:var(--teal)}
  .flash .front-term{font-size:1.55rem;font-weight:800}
  .flash .front-hint{margin-top:14px;font-size:.76rem;color:var(--sub)}
  .flash .reading{font-size:.82rem;color:var(--teal);font-weight:700;margin-bottom:6px}
  .flash .def{font-size:.95rem}
  .flash .eng{font-size:.72rem;color:var(--sub);margin-top:10px}
  .nav{display:flex;gap:10px;margin-top:12px}
  .nav button{flex:1;padding:12px;border:none;border-radius:14px;background:#fff;color:var(--text);font-size:.92rem;font-weight:700;box-shadow:var(--shadow);cursor:pointer}
  .nav button:active{transform:scale(.97)}
  .knowbtn{margin-top:10px;width:100%;padding:12px;border:none;border-radius:14px;background:var(--teal-soft);color:var(--teal);font-weight:800;font-size:.92rem;cursor:pointer}
  .knowbtn.on{background:var(--teal);color:#fff}

  /* formula */
  .frm{background:var(--card);border-radius:18px;padding:14px 15px;margin-bottom:11px;box-shadow:var(--shadow)}
  .frm .fname{font-weight:800;font-size:.98rem}
  .frm .fdesc{font-size:.76rem;color:var(--sub);margin:2px 0 8px}
  .frm .feq{background:var(--bg);border-radius:12px;padding:10px 12px;font-size:.9rem;font-weight:700;border-left:5px solid var(--teal)}
  .frm .fex{font-size:.78rem;margin-top:8px}
  .frm .fex b{color:var(--teal)}

  /* chapter */
  .ch{background:var(--card);border-radius:18px;padding:6px 16px;margin-bottom:11px;box-shadow:var(--shadow)}
  .ch summary{font-weight:800;font-size:1rem;padding:12px 0;cursor:pointer;list-style:none}
  .ch summary::-webkit-details-marker{display:none}
  .ch summary .num{color:var(--teal);font-size:.8rem;margin-right:6px}
  .ch[open] summary{border-bottom:1px dashed var(--teal-soft)}
  .ch .body{padding:6px 0 14px;font-size:.9rem}
  .ch .body h4{margin:14px 0 4px;font-size:.92rem;color:var(--teal)}
  .ch .body ul{margin:4px 0;padding-left:20px}
  .ch .body li{margin:3px 0}
  .ch .body b{color:var(--teal)}

  /* quiz */
  .qbox{background:var(--card);border-radius:20px;padding:18px 16px;box-shadow:var(--shadow)}
  .qmeta{font-size:.78rem;color:var(--sub);margin-bottom:10px;display:flex;justify-content:space-between}
  .qtag{display:inline-block;font-size:.68rem;color:#fff;background:var(--blue);padding:2px 9px;border-radius:12px;margin-bottom:8px}
  .qtext{font-size:1.02rem;font-weight:700;margin-bottom:14px}
  .opt{display:block;width:100%;text-align:left;padding:13px 14px;margin-bottom:9px;border:2px solid var(--teal-soft);border-radius:14px;background:#fff;font-size:.92rem;color:var(--text);cursor:pointer}
  .opt:active{transform:scale(.99)}
  .opt.correct{background:#e7f8ee;border-color:var(--green);font-weight:700}
  .opt.wrong{background:#ffeae6;border-color:var(--red)}
  .opt:disabled{cursor:default;opacity:1}
  .exp{background:var(--bg);border-radius:14px;padding:12px 14px;font-size:.85rem;margin-top:6px;border-left:5px solid var(--teal);display:none}
  .exp.show{display:block}
  .exp b{color:var(--teal)}
  .qnext{margin-top:14px;width:100%;padding:13px;border:none;border-radius:14px;background:linear-gradient(90deg,var(--teal),var(--blue));color:#fff;font-weight:800;font-size:.95rem;cursor:pointer;display:none}
  .qnext.show{display:block}
  .result{text-align:center;padding:10px}
  .result .big{font-size:2.2rem;font-weight:800;color:var(--teal);margin:8px 0}

  .view{display:none}.view.show{display:block}
  .disc{font-size:.72rem;color:var(--sub);background:#fff;border-radius:12px;padding:10px 12px;margin-bottom:12px;box-shadow:var(--shadow)}
  footer{text-align:center;font-size:.7rem;color:var(--sub);padding:16px}
</style>
</head>
<body>
<header>
  <h1>📊 ウェブ解析士 学習カード</h1>
  <p>初級｜解説・用語・公式・問題集</p>
</header>
<div class="wrap">
  <div class="tabs">
    <button id="tab_ch" class="active" onclick="switchTab('ch')">📖解説</button>
    <button id="tab_cards" onclick="switchTab('cards')">📇用語</button>
    <button id="tab_forms" onclick="switchTab('forms')">🧮公式</button>
    <button id="tab_quiz" onclick="switchTab('quiz')">✅問題</button>
  </div>

  <!-- 章解説 -->
  <div id="view_ch" class="view show">
    <div class="disc">📌 これは公式テキストと<b>併用</b>する学習サポートです。出題範囲・定義の正本は最新の公式テキストをご確認ください。</div>
    <div id="chapters"></div>
    <footer>まず全体像を読んでから用語・問題へ 🌿</footer>
  </div>

  <!-- 用語カード -->
  <div id="view_cards" class="view">
    <div class="chips" id="chips"></div>
    <div class="counter" id="counter"></div>
    <div class="flash" id="flash" onclick="flip()"></div>
    <button class="knowbtn" id="knowbtn" onclick="toggleKnown(event)">覚えた！にする</button>
    <div class="nav"><button onclick="prev()">← 前</button><button onclick="next()">次 →</button></div>
    <footer>カードをタップで意味が出るよ 🌿</footer>
  </div>

  <!-- 公式集 -->
  <div id="view_forms" class="view">
    <div id="forms"></div>
    <footer>計算問題はここを暗記！ ✍️</footer>
  </div>

  <!-- 問題集 -->
  <div id="view_quiz" class="view">
    <div class="chips" id="qchips"></div>
    <div id="quizArea"></div>
  </div>
</div>

<script>
/* ============ 章解説 ============ */
const CHAPTERS = [
  {num:"第1章", t:"ウェブ解析士の役割と基本指標", body:`
    <h4>ウェブ解析とは</h4>
    <p>アクセスデータや事業データを分析し、<b>事業の成果（売上・利益）に貢献する</b>ための改善を提案する活動。数字を見るだけでなく「次にどうするか」を示すのが役割。</p>
    <h4>KGIとKPI</h4>
    <ul>
      <li><b>KGI</b>＝最終的なゴールを数値化したもの（例：年間売上1億円）</li>
      <li><b>KPI</b>＝KGIに至るまでの中間目標（例：月間CV数500件）</li>
      <li><b>KSF</b>＝目標達成のカギとなる重要成功要因</li>
    </ul>
    <h4>基本のアクセス指標</h4>
    <ul>
      <li><b>PV（ページビュー）</b>：ページが見られた回数</li>
      <li><b>セッション</b>：訪問のまとまり（≒訪問数）。1人が5ページ見ても1セッション</li>
      <li><b>ユーザー数</b>：訪れた人数（重複を除く）</li>
    </ul>`},
  {num:"第2章", t:"事業分析とマーケティング", body:`
    <h4>環境分析のフレームワーク</h4>
    <ul>
      <li><b>3C</b>：Customer（市場・顧客）／Competitor（競合）／Company（自社）</li>
      <li><b>SWOT</b>：強み・弱み（内部）／機会・脅威（外部）</li>
      <li><b>PEST</b>：政治・経済・社会・技術（マクロ環境）</li>
    </ul>
    <h4>戦略の組み立て</h4>
    <ul>
      <li><b>STP</b>：セグメンテーション（分ける）→ ターゲティング（狙う）→ ポジショニング（位置づけ）の順</li>
      <li><b>4P</b>（売り手視点）：Product・Price・Place・Promotion</li>
      <li><b>4C</b>（買い手視点）：顧客価値・コスト・利便性・コミュニケーション</li>
    </ul>
    <h4>顧客理解</h4>
    <ul>
      <li><b>ペルソナ</b>：典型的な顧客像を1人の人物として具体化</li>
      <li><b>カスタマージャーニー</b>：認知→興味→比較→購入→利用の体験の流れと接点を可視化</li>
    </ul>`},
  {num:"第3章", t:"アクセス解析の基礎とGA4", body:`
    <h4>GA4の考え方</h4>
    <p>Googleの解析ツール。あらゆる行動を<b>「イベント」</b>として記録するのが最大の特徴（ページ表示・クリック・スクロール・購入など全部イベント）。</p>
    <h4>ディメンションと指標</h4>
    <ul>
      <li><b>ディメンション</b>＝データの「軸・属性」（例：参照元、ページ、デバイス）</li>
      <li><b>指標</b>＝「数値」（例：セッション数、CV数、エンゲージメント率）</li>
    </ul>
    <h4>GA4のエンゲージメント</h4>
    <ul>
      <li><b>エンゲージしたセッション</b>：10秒以上継続／CV発生／2PV以上 のいずれかを満たすセッション</li>
      <li><b>エンゲージメント率</b>＝エンゲージしたセッション ÷ 全セッション</li>
      <li><b>直帰率</b>＝1 − エンゲージメント率（GA4の新定義）</li>
    </ul>`},
  {num:"第4章", t:"集客の分析", body:`
    <h4>流入の種類（参照元/メディア）</h4>
    <ul>
      <li><b>オーガニック検索</b>：検索結果の自然枠（SEOで増やす）</li>
      <li><b>有料検索（リスティング）</b>：検索連動型広告。クリック課金が基本</li>
      <li><b>ダイレクト</b>：URL直接入力・ブックマーク等</li>
      <li><b>リファラル</b>：他サイトのリンク経由</li>
      <li><b>ソーシャル</b>：SNS経由</li>
    </ul>
    <h4>トリプルメディア</h4>
    <ul>
      <li><b>ペイドメディア</b>：広告（買う）</li>
      <li><b>オウンドメディア</b>：自社サイト・ブログ（持つ）</li>
      <li><b>アーンドメディア</b>：SNSの口コミ・評判（得る）</li>
    </ul>`},
  {num:"第5章", t:"行動の分析（サイト内）", body:`
    <h4>ページ単位の指標</h4>
    <ul>
      <li><b>ランディングページ</b>：訪問者が最初に着地したページ</li>
      <li><b>直帰率</b>：1ページで離脱したセッションの割合</li>
      <li><b>離脱率</b>：そのページが訪問の最後になった割合</li>
      <li><b>回遊率</b>：1セッションあたり何ページ見たか（PV/セッション）</li>
    </ul>
    <h4>改善の手法</h4>
    <ul>
      <li><b>EFO</b>：入力フォーム最適化。離脱を減らしCVを増やす</li>
      <li><b>ヒートマップ</b>：ページのどこがよく見られ・クリックされたかを色で可視化</li>
      <li><b>A/Bテスト</b>：2つの案を出し分け、成果の良い方を採用</li>
    </ul>`},
  {num:"第6章", t:"成果の分析", body:`
    <h4>コンバージョンの種類</h4>
    <ul>
      <li><b>マクロCV</b>：最終成果（購入・申込）</li>
      <li><b>マイクロCV</b>：中間成果（メルマガ登録・資料請求など）</li>
    </ul>
    <h4>費用対効果の指標</h4>
    <ul>
      <li><b>CPA</b>＝広告費÷CV数（1件獲得の単価。低いほど良い）</li>
      <li><b>ROAS</b>＝売上÷広告費×100（売上ベースの費用対効果）</li>
      <li><b>ROI</b>＝利益÷投資額×100（利益ベース）</li>
      <li><b>LTV</b>：顧客が生涯にもたらす利益。リピートで高まる</li>
    </ul>
    <h4>アトリビューション分析</h4>
    <p>CVに至るまでの<b>複数の接点それぞれの貢献度</b>を評価する考え方。最後のクリックだけで評価しない（間接効果・アシストCVを見る）。</p>`},
  {num:"第7章", t:"レポーティングとKPI設計", body:`
    <h4>KPI設計</h4>
    <ul>
      <li><b>KPIツリー</b>：KGIを構成要素に分解して管理（例：売上＝訪問数×CVR×客単価）</li>
    </ul>
    <h4>PDCAサイクル</h4>
    <ul>
      <li><b>Plan</b>（計画）→ <b>Do</b>（実行）→ <b>Check</b>（評価）→ <b>Action</b>（改善）を回し続ける</li>
    </ul>
    <h4>良いレポートとは</h4>
    <ul>
      <li>数字の羅列ではなく、<b>示唆（だから何が言えるか）と改善提案</b>を添える</li>
      <li><b>ダッシュボード</b>：重要指標を一覧で継続的にモニタリングする仕組み</li>
    </ul>`}
];

/* ============ 用語カード ============ */
const TERMS = [
  // 指標
  {t:"セッション", r:"せっしょん", e:"Session", c:"指標", d:"訪問のまとまり。1人が何ページ見ても1訪問は1セッション。"},
  {t:"PV（ページビュー）", r:"ぺーじびゅー", e:"Page View", c:"指標", d:"ページが表示された回数。同じ人が3回見れば3PV。"},
  {t:"ユーザー数", r:"ゆーざーすう", e:"Users", c:"指標", d:"訪れた人数（重複を除く）。"},
  {t:"新規率／リピーター", r:"しんきりつ", e:"New / Returning", c:"指標", d:"初訪問の人と、再訪した人の割合。"},
  {t:"直帰率", r:"ちょっきりつ", e:"Bounce Rate", c:"指標", d:"1ページで離脱した割合。GA4では『エンゲージのなかったセッションの割合』。"},
  {t:"離脱率", r:"りだつりつ", e:"Exit Rate", c:"指標", d:"そのページが訪問の最後になった割合。離脱数÷そのページのPV。"},
  {t:"回遊率", r:"かいゆうりつ", e:"Pages / Session", c:"指標", d:"1セッションで平均何ページ見たか。PV÷セッション。"},
  {t:"インプレッション", r:"いんぷれっしょん", e:"Impression", c:"指標", d:"広告やコンテンツが表示された回数。"},
  {t:"リーチ", r:"りーち", e:"Reach", c:"指標", d:"広告が届いた『人数』（重複を除く）。インプレッションは回数。"},
  {t:"フリークエンシー", r:"ふりーくえんしー", e:"Frequency", c:"指標", d:"1人あたり平均何回広告に接触したかの回数。"},
  {t:"CTR（クリック率）", r:"くりっくりつ", e:"Click Through Rate", c:"指標", d:"表示回数のうちクリックされた割合。クリック÷表示×100。"},
  {t:"CVR（コンバージョン率）", r:"こんばーじょんりつ", e:"Conversion Rate", c:"指標", d:"訪問のうち成果に至った割合。CV÷セッション×100。"},

  // 戦略・分析
  {t:"KGI", r:"けーじーあい", e:"Key Goal Indicator", c:"戦略", d:"重要目標達成指標。最終ゴールを数値化（例：年商1億）。"},
  {t:"KPI", r:"けーぴーあい", e:"Key Performance Indicator", c:"戦略", d:"重要業績評価指標。KGIまでの中間目標を数値化。"},
  {t:"KSF（重要成功要因）", r:"けーえすえふ", e:"Key Success Factor", c:"戦略", d:"目標達成のカギとなる要因。『何をやれば勝てるか』。"},
  {t:"KPIツリー", r:"けーぴーあいつりー", e:"KPI Tree", c:"戦略", d:"KGIを構成要素に分解して管理する図（売上＝訪問×CVR×客単価 等）。"},
  {t:"3C分析", r:"さんしーぶんせき", e:"3C", c:"戦略", d:"Customer（市場・顧客）／Competitor（競合）／Company（自社）。"},
  {t:"SWOT分析", r:"すうぉっと", e:"SWOT", c:"戦略", d:"強み・弱み（内部）／機会・脅威（外部）で状況整理。"},
  {t:"PEST分析", r:"ぺすと", e:"PEST", c:"戦略", d:"政治・経済・社会・技術でマクロ環境を分析。"},
  {t:"4P", r:"よんぴー", e:"4P", c:"戦略", d:"売り手視点：Product・Price・Place・Promotion。"},
  {t:"4C", r:"よんしー", e:"4C", c:"戦略", d:"買い手視点：顧客価値・コスト・利便性・コミュニケーション。"},
  {t:"STP", r:"えすてぃーぴー", e:"STP", c:"戦略", d:"セグメンテーション→ターゲティング→ポジショニングの順で戦略を立てる。"},
  {t:"セグメンテーション", r:"せぐめんてーしょん", e:"Segmentation", c:"戦略", d:"市場を共通の特徴ごとに分けること。"},
  {t:"ターゲティング", r:"たーげてぃんぐ", e:"Targeting", c:"戦略", d:"分けた中から狙う層を決めること。"},
  {t:"ポジショニング", r:"ぽじしょにんぐ", e:"Positioning", c:"戦略", d:"競合の中で自社をどう位置づけ差別化するか。"},

  {ch:"7.レポート", q:"PDCAの「C」が表すのは？", o:["Check（評価）","Create（作成）","Customer（顧客）","Cost（費用）"], a:0, ex:"Plan→Do→Check（評価）→Action の評価フェーズです。"},
  {ch:"7.レポート", q:"良いレポートの条件として適切なのは？", o:["数字に加え示唆と改善提案を添える","とにかく全データを載せる","数字だけを並べる","グラフを使わない"], a:0, ex:"『だから何をすべきか』まで示すのが価値あるレポートです。"},
  {ch:"7.レポート", q:"ダッシュボードの目的は？", o:["重要指標を一覧で継続的にモニタリングする","一度だけ集計して捨てる","広告を配信する","フォームを作る"], a:0, ex:"重要KPIを一覧化し、変化を継続的に監視するための仕組みです。"}
];

/* ============ 共通・状態 ============ */
const CATS = ["全部","指標","戦略","集客","広告","行動","成果","GA4"];
const KEY_KNOWN = "wa_known";
let curCat="全部", idx=0, flipped=false;

function getKnown(){ try{return JSON.parse(localStorage.getItem(KEY_KNOWN))||[]}catch(e){return[]} }
function setKnown(a){ localStorage.setItem(KEY_KNOWN, JSON.stringify(a)); }
function deck(){ return curCat==="全部"?TERMS:TERMS.filter(t=>t.c===curCat); }

function renderChapters(){
  const c=document.getElementById('chapters'); c.innerHTML='';
  CHAPTERS.forEach((ch,i)=>{
    const d=document.createElement('details'); d.className='ch'; if(i===0) d.open=true;
    d.innerHTML=`<summary><span class="num">${ch.num}</span>${ch.t}</summary><div class="body">${ch.body}</div>`;
    c.appendChild(d);
  });
}

function renderChips(){
  const c=document.getElementById('chips'); c.innerHTML='';
  CATS.forEach(cat=>{
    const b=document.createElement('button'); b.textContent=cat;
    if(cat===curCat) b.className='active';
    b.onclick=()=>{curCat=cat;idx=0;flipped=false;renderChips();renderCard();};
    c.appendChild(b);
  });
}
function renderCard(){
  const d=deck(); if(d.length===0) return; if(idx>=d.length) idx=0;
  const t=d[idx]; const known=getKnown().includes(t.t);
  document.getElementById('counter').textContent=`${idx+1} / ${d.length}　（覚えた：${getKnown().length}/${TERMS.length}）`;
  const f=document.getElementById('flash'); f.className='flash'+(known?' known':'');
  if(!flipped){
    f.innerHTML=`<div class="cat">${t.c}</div>${known?'<div class="known-mark">✓</div>':''}<div class="front-term">${t.t}</div><div class="front-hint">タップで意味を見る 👆</div>`;
  }else{
    f.innerHTML=`<div class="cat">${t.c}</div>${known?'<div class="known-mark">✓</div>':''}<div class="reading">${t.r}</div><div class="def">${t.d}</div><div class="eng">${t.e}</div>`;
  }
  const kb=document.getElementById('knowbtn'); kb.className='knowbtn'+(known?' on':'');
  kb.textContent=known?'✓ 覚えた！（解除）':'覚えた！にする';
}
function flip(){flipped=!flipped;renderCard();}
function next(){idx=(idx+1)%deck().length;flipped=false;renderCard();}
function prev(){const n=deck().length;idx=(idx-1+n)%n;flipped=false;renderCard();}
function toggleKnown(ev){ev.stopPropagation();const t=deck()[idx];let k=getKnown();if(k.includes(t.t))k=k.filter(x=>x!==t.t);else k.push(t.t);setKnown(k);renderCard();}

function renderForms(){
  const c=document.getElementById('forms'); c.innerHTML='';
  FORMULAS.forEach(f=>{const el=document.createElement('div');el.className='frm';
    el.innerHTML=`<div class="fname">${f.n}</div><div class="fdesc">${f.d}</div><div class="feq">${f.eq}</div><div class="fex">${f.ex}</div>`;
    c.appendChild(el);});
}

/* 問題集 */
const QCATS=["全部","1.基本指標","2.戦略","3.GA4","4.集客","5.行動","6.成果","7.レポート"];
let qCat="全部", qList=[], qPos=0, qScore=0, qAnswered=false;
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function startQuiz(){
  const base = qCat==="全部"?QUIZ:QUIZ.filter(q=>q.ch===qCat);
  qList=shuffle(base); qPos=0; qScore=0; qAnswered=false; renderQuiz();
}
function renderQchips(){
  const c=document.getElementById('qchips'); c.innerHTML='';
  QCATS.forEach(cat=>{const b=document.createElement('button');b.textContent=cat==="全部"?"全部":cat.replace(/^\d\./,'');
    if(cat===qCat)b.className='active';
    b.onclick=()=>{qCat=cat;startQuiz();};c.appendChild(b);});
}
function renderQuiz(){
  const area=document.getElementById('quizArea');
  if(qPos>=qList.length){
    const pct=qList.length?Math.round(qScore/qList.length*100):0;
    let msg = pct>=80?"合格ラインに届く正答率！🎉":pct>=60?"あと一歩！復習しよう 💪":"くり返して定着させよう 🌱";
    area.innerHTML=`<div class="qbox result"><div>結果</div><div class="big">${qScore} / ${qList.length}</div><div>正答率 ${pct}%　${msg}</div><button class="qnext show" onclick="startQuiz()">もう一度（シャッフル）</button></div>`;
    return;
  }
  const q=qList[qPos]; qAnswered=false;
  let opts=q.o.map((o,i)=>`<button class="opt" onclick="answer(${i})">${o}</button>`).join('');
  area.innerHTML=`<div class="qbox">
    <div class="qmeta"><span>第${qPos+1}問 / ${qList.length}</span><span>正解 ${qScore}</span></div>
    <span class="qtag">${q.ch}</span>
    <div class="qtext">${q.q}</div>
    <div id="opts">${opts}</div>
    <div class="exp" id="exp"></div>
    <button class="qnext" id="qnext" onclick="qNext()">次の問題 →</button>
  </div>`;
}
function answer(i){
  if(qAnswered) return; qAnswered=true;
  const q=qList[qPos];
  const btns=document.querySelectorAll('#opts .opt');
  btns.forEach((b,bi)=>{b.disabled=true; if(bi===q.a)b.classList.add('correct'); if(bi===i&&i!==q.a)b.classList.add('wrong');});
  if(i===q.a) qScore++;
  const exp=document.getElementById('exp');
  exp.innerHTML=(i===q.a?"⭕ 正解！ ":"❌ 不正解 ")+`<b>${q.o[q.a]}</b><br>${q.ex}`;
  exp.classList.add('show');
  document.querySelector('.qmeta').lastElementChild.textContent='正解 '+qScore;
  document.getElementById('qnext').classList.add('show');
}
function qNext(){qPos++;renderQuiz();}

function switchTab(w){
  ['ch','cards','forms','quiz'].forEach(k=>{
    document.getElementById('tab_'+k).classList.toggle('active', k===w);
    document.getElementById('view_'+k).classList.toggle('show', k===w);
  });
  if(w==='quiz'&&qList.length===0) startQuiz();
  window.scrollTo(0,0);
}

renderChapters(); renderChips(); renderCard(); renderForms(); renderQchips();
</script>
